;; =========================================================================
;; ProcessorOptimizer Configuration File
;; =========================================================================

[General]
; Diagnostic logging to 'ProcessorOptimizer.log'.
; 0 = Disabled [Recommended: Zero overhead for daily gaming]
; 1 = Enabled  [Troubleshooting: Verify functionality or check crashes]
EnableLogging=1

; Delay (in ms) before optimizing to allow main engine threads to load.
; 8000 = Default [Recommended: 8000 (8 seconds)]
; Tip: If set too low, it may reduce compatibility with other DLL mods.
InitDelayMs=8000

[System]
; Prevent Windows "Efficiency Mode" (EcoQoS/Power Throttling). Crucial for Win11/Intel P/E-Cores.
; 0 = Disabled
; 1 = Enabled  [Recommended: Forces max performance, but may slightly increase temp/power draw]
DisableEcoQoS=1

; Force global timer resolution to 1ms to reduce frame-time spikes and stuttering.
; 0 = Disabled
; 1 = Enabled  [Recommended]
DisableHighPrecisionTimer=1

[CPU]
; "Core Shake-Up" strategy to fix games bottlenecked on Core 0.
; 0 = Disabled
; 1 = Target Core 0 only [Recommended: Safely moves heavy threads]
; 2 = Target ALL cores   [Aggressive redistribution]
EnableAffinityFix=1

; Thread allocation method.
; 0 = Hard Affinity [Recommended: Legacy API. Forceful, old but effective]
; 1 = Soft Affinity (Experimental: Win10/11 API. New, intelligent, but may cause stuttering)
; Hard -> Absolute Restriction: Strictly confines CPU resources to specified cores. No crossover.
; Soft -> Priority Allocation: Prioritizes specified cores, but allows using others under heavy load.
EnableSoftAffinity=0

; Force game to use specific CPU cores (Hexadecimal format, e.g., 0xFF for first 8 logical cores).
; 0 = Auto-optimize based on 'EnableAffinityFix' [Recommended]
; Tip: Helpful for poorly scheduled games or systems, such as strictly limiting a game to Performance Cores (P-Cores).
CustomAffinityMask=0

[Process]
; Elevate game priority over background apps (e.g., Discord, Chrome).
; 0 = Normal
; 1 = High         [Recommended]
; 2 = Above Normal
; 3 = Realtime     [WARNING: Highly dangerous. May freeze PC/peripherals]
PriorityLevel=1

; Background thread to prevent game engine from reverting PriorityLevel.
; 0 = Disabled
; 1 = Enabled [Recommended]
EnableWatchdog=1