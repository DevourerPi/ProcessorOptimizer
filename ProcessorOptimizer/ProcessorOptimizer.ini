[General]
; Delay in milliseconds before executing the optimizer.
; Gives the game engine time to initialize threads (Default: 8000)
InitDelayMs=8000

[System]
; Disables Windows Power Throttling (EcoQoS) to force max CPU frequency (1 = True, 0 = False)
DisableEcoQoS=1
; Sets system timer resolution to 1ms to reduce thread wake-up latency (1 = True, 0 = False)
EnableHighPrecisionTimer=1

[CPU]
; Enable CPU modification module (1 = True, 0 = False)
EnableAffinityFix=1

; Use modern Windows 10 CPU Sets instead of hard affinity.
; Highly recommended to prevent window flickering/crashing (1 = True, 0 = False)
EnableSoftAffinity=1

; Custom affinity mask in Hex (e.g., 0xFF for first 8 cores). 
; Set to 0 to bypass custom mask and use auto Core-0 redistribution.
CustomAffinityMask=0

[Process]
; Set process priority class:
; 0 = Normal, 1 = High, 2 = Above Normal, 3 = Realtime (Not Recommended)
PriorityLevel=1

; Enables a background thread that prevents the game engine from 
; reverting priority changes back to Normal (1 = True, 0 = False)
EnableWatchdog=1