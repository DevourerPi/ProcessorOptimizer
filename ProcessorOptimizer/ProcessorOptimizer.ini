[General]
; Delay in milliseconds before executing the optimizer.
; Gives the game engine time to initialize threads (Default: 8000)
InitDelayMs=8000

[System]
; Disables Windows Power Throttling (EcoQoS) to force max CPU frequency (1 = True, 0 = False)
DisableEcoQoS=1
; Sets system timer resolution to 1ms to reduce thread wake-up latency (1 = True, 0 = False)
EnableHighPrecisionTimer=1

[CPU]
; Defines the core redistribution strategy (The Shake Up):
; 0 = Do nothing
; 1 = Temporarily unbind and restore Core 0 only
; 2 = Temporarily unbind and restore ALL active cores sequentially
EnableAffinityFix=1

; Determines the underlying API used for BOTH the redistribution (above) 
; and the Custom Mask (below).
; 1 = Use Windows 10 Soft Affinity (CPU Sets) - Smooth, prevents flickering.
; 0 = Use Hard Affinity (SetProcessAffinityMask) - Forceful, legacy method.
EnableSoftAffinity=0

; The final state mask applied after the redistribution phase finishes.
; Uses Hex values (e.g., 0xFF for first 8 cores). 
; Set to 0 to bypass and rely entirely on the EnableAffinityFix strategy.
CustomAffinityMask=0

[Process]
; Set process priority class:
; 0 = Normal, 1 = High, 2 = Above Normal, 3 = Realtime (Not Recommended)
PriorityLevel=1

; Enables a background thread that prevents the game engine from 
; reverting priority changes back to Normal (1 = True, 0 = False)
EnableWatchdog=1